name: check

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: check-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true

      - name: Install dependencies
        run: vp install

      - name: Format check
        run: vp fmt --check

      - name: Lint
        run: vp lint --config oxlint.config.json

      - name: Astro check
        run: vp exec astro check
